name: Update flake inputs

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream for changes
        id: check
        run: |
          LATEST=$(gh api repos/sadjow/claude-code-nix/commits/main --jq '.sha')
          CURRENT=$(jq -r '.nodes["claude-code-nix"].locked.rev' flake.lock)
          echo "latest=$LATEST current=$CURRENT"
          echo "changed=$( [ "$LATEST" != "$CURRENT" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v30
        if: steps.check.outputs.changed == 'true'
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Update flake inputs
        if: steps.check.outputs.changed == 'true'
        run: nix flake update

      - name: Build default package
        if: steps.check.outputs.changed == 'true'
        run: nix build

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update flake inputs"
          git push
